<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>校搭 v3.0 - 智能互选匹配系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🤝 校搭 (Campus Match) v3.0</h1>
            <p>找志同道合的搭子，实力匹配，手动晋级</p>
        </header>

        <section class="panel">
            <h3>📇 完善个人名片</h3>
            <div class="form-row">
                <input type="text" id="username" placeholder="昵称">
                <select id="gender">
                    <option value="男">男</option>
                    <option value="女">女</option>
                </select>
                <select id="mainCat" onchange="updateSub()">
                    <option value="">大类</option>
                    <option value="运动">运动</option>
                    <option value="游戏">游戏</option>
                    <option value="乐器">乐器</option>
                </select>
                <select id="subCat" disabled><option>小类</option></select>
                <button onclick="register()" class="btn-main">进入校园广场</button>
            </div>
        </section>

        <section class="my-status">
            <div class="status-box">
                <h4>🔔 待处理申请 (<span id="req-count">0</span>)</h4>
                <div id="incoming-requests"></div>
            </div>
            <div class="status-box">
                <h4>✅ 我的搭子 (已匹配)</h4>
                <div id="matched-list"></div>
            </div>
        </section>

        <nav class="filter-bar">
            <button onclick="renderSquare('全部')">全校广场</button>
            <button onclick="smartMatch()">✨ 智能推荐 (找同分段)</button>
        </nav>

        <div id="square" class="user-grid">
            </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3>🎉 活动结束结算</h3>
            <p>本次与 <span id="partner-name"></span> 的活动愉快吗？</p>
            <p>胜方将获得 10 积分，输方不扣分。</p>
            <div class="modal-btns">
                <button onclick="closeModal(true)" class="btn-win">我赢了(+10)</button>
                <button onclick="closeModal(false)" class="btn-lose">惜败(不加分)</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
demoo
</html>
